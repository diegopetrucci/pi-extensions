name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check patch whitespace
        run: git diff --check HEAD~1..HEAD
        if: github.event_name == 'push'

      - name: Check PR patch whitespace
        run: git diff --check origin/${{ github.base_ref }}...HEAD
        if: github.event_name == 'pull_request'

      - name: Run validation
        run: npm run ci
