name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22.19.0
          - 24

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check patch whitespace
        run: git diff --check HEAD~1..HEAD
        if: github.event_name == 'push'

      - name: Check PR patch whitespace
        run: git diff --check origin/${{ github.base_ref }}...HEAD
        if: github.event_name == 'pull_request'

      - name: Run validation
        run: npm run ci
